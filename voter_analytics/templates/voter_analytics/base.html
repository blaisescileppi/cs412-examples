<!--voter_analytics/templates/voter_analytics/base.html-->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Newton Voter Analytics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      width: min(1200px, 92%);
      margin: 0 auto;
    }

    .site-header {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      padding: 24px 0;
      margin-bottom: 28px;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .site-title {
      margin: 0;
      font-size: 2rem;
    }

    .site-subtitle {
      margin: 6px 0 0;
      opacity: 0.9;
    }

    .site-nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .site-nav a {
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
    }

    .site-nav a:hover {
      background: rgba(255,255,255,0.22);
    }

    .hero-card,
    .filter-card,
    .table-card,
    .pagination-card,
    .graph-card,
    .detail-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .filter-grid,
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    label,
    legend {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    select,
    button,
    a.btn {
      font: inherit;
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      background: white;
    }

    .checkbox-group {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
    }

    .checkbox-group label {
      display: inline-block;
      margin-right: 16px;
      font-weight: normal;
    }

    .button-row {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #111827;
    }

    .results-header {
      margin: 10px 0 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #eff6ff;
    }

    th,
    td {
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .pagination-card {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .clean-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .clean-list li {
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      th,
      td {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <h1 class="site-title">Newton Voter Analytics</h1>
        <p class="site-subtitle">Campaign targeting dashboard for Newton voter records</p>
      </div>
      <nav class="site-nav">
        <a href="{% url 'voters' %}">Voter List</a>
        <a href="{% url 'graphs' %}">Graphs</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
