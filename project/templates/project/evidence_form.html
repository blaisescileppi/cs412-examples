<!-- project/templates/project/evidence_form.html
     Add or update a piece of evidence for a case. The case context is
     shown at the top so the doctor knows which case they're editing. -->

{% extends 'project/base.html' %}
{% block title %}{{ action }} Evidence — {{ case.title }}{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="page-header">
        <h1>{{ action }} Evidence</h1>
        <p>Case: <a href="{% url 'case_detail' case.pk %}">{{ case.title }}</a></p>
    </div>

    <div class="card form-wrap">
        <form method="post" class="django-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="btn-row">
                <button type="submit" class="btn btn-success">Save evidence</button>
                <a href="{% url 'case_detail' case.pk %}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
