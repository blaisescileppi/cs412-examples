<!-- mini_insta/templates/mini_insta/update_post_form.html -->

{% extends "mini_insta/base.html" %}

{% block content %}

<h2>Update Post</h2>

<form method="POST">
    {% csrf_token %}

    {% for field in form %}
        <label>{{ field.label }}</label><br>
        {{ field }}<br><br>
    {% endfor %}

    <button type="submit">Save Changes</button>
</form>

<br>

<a href="{% url 'show_post' object.pk %}">Cancel</a>

{% endblock %}
