<!-- project/templates/project/slot_confirm_delete.html -->

{% extends 'project/base.html' %}
{% block title %}Delete Slot{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="page-header"><h1>Delete Availability Slot</h1></div>
    <div class="card form-wrap">
        <p>
            Delete the slot on <strong>{{ object.date|date:"l, F j" }}</strong>
            at <strong>{{ object.start_time|time:"g:i a" }}</strong>?
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="btn-row">
                <button type="submit" class="btn btn-danger">Yes, delete</button>
                <a href="{% url 'doctor_availability' %}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
