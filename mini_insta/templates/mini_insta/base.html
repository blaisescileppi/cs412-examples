<!-- mini_insta/template/mini_insta/base.html -->

{% load static %}
<html>
  <head>
    <title>Mini Insta</title>
    <link rel="stylesheet" href="{% static 'mini_insta.css' %}">
  </head>
  <body>
    <header>
      <h1>Mini Insta</h1>
      <nav>
        <a href="{% url 'show_all_profiles' %}">All Profiles</a>

        {% if request.user.is_authenticated %}
          <a href="{% url 'my_profile' %}">My Profile</a>
          <a href="{% url 'show_feed' %}">Feed</a>
          <a href="{% url 'search' %}">Search</a>

          <form action="{% url 'logout' %}" method="POST" style="display:inline;">
            {% csrf_token %}
            <button type="submit">Logout</button>
          </form>

          <span>Logged in as: {{ request.user.username }}</span>
        {% else %}
          <a href="{% url 'login' %}">Login</a>
          <a href="{% url 'create_profile' %}">Create Profile</a>
        {% endif %}
      </nav>
      <hr>
    </header>
    <hr>

    {% block content %}
    {% endblock %}

    <footer>
      <hr>
      <a href="{% url 'show_all_profiles' %}">Back to All Profiles</a>
    </footer>
  </body>
</html>
